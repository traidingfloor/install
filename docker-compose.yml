# =============================================================================
# TrAIding Floor — public install compose
# =============================================================================
# This file lives at github.com/traidingfloor/install. It pulls pre-built
# images from Docker Hub — no source code, no compilers, no Node/Python
# installs on your host. Just Docker.
#
# Quick start:
#   docker compose up -d
#
# First time? Open http://localhost in your browser. The onboarding wizard
# fires automatically and walks you through 11 steps (exchange keys, LLM
# brain, strategy roster, etc.). Takes about 5 minutes.
#
# To update:
#   docker compose pull && docker compose up -d
#
# To stop:
#   docker compose down
#
# Want to switch image channels (stable vs beta)?
#   Set IMAGE_TAG in your shell or .env, e.g.: IMAGE_TAG=beta docker compose up -d
#
# Want to LAN-share the dashboard (e.g. view from your phone)?
#   Change the port mappings below from 127.0.0.1:80 to 0.0.0.0:80.
#   WARNING: the API has no auth — only do this on a trusted network.
# =============================================================================

services:

  # ────────────────────────────────────────────────────────────────────────
  # FastAPI backend + agent loop. The heart of the system. Everything
  # else is optional polish around this service.
  # ──────────────────────────────────────────────────────────────────────
  traiding-floor:
    image: ${IMAGE_NAMESPACE:-traidingfloor}/traiding-floor:${IMAGE_TAG:-latest}
    container_name: traiding-floor
    restart: unless-stopped
    ports:
      # Localhost only by default — the API has no auth. Change to
      # "0.0.0.0:8080:8080" if you want it on your LAN.
      - "127.0.0.1:8080:8080"
    volumes:
      # user-data/ on your HOST is the single source of truth: keys,
      # trade history, beliefs, settings. Containers are stateless;
      # you can wipe + re-pull at any time without losing data.
      - ./user-data:/app/user-data
      - ./logs:/app/logs
    env_file:
      # The onboarding wizard writes this on first run; if it does
      # not exist yet, compose just skips it and the wizard creates it.
      - path: ./user-data/.env
        required: false
    environment:
      - TF_DOCKER=1
      - TF_USER_DATA=/app/user-data
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8080/health\").read()' || exit 1"]
      interval: 30s
      timeout: 6s
      retries: 4
      start_period: 30s

  # ──────────────────────────────────────────────────────────────────
  # Next.js operator dashboard. The page humans look at. Proxies all
  # /api/* and /head_trader/* to the backend over the compose network.
  # ───────────────────────────────────────────────────────────────────
  traiding-floor-web:
    image: ${IMAGE_NAMESPACE:-traidingfloor}/traiding-floor-web:${IMAGE_TAG:-latest}
    container_name: traiding-floor-web
    restart: unless-stopped
    depends_on:
      traiding-floor:
        condition: service_healthy
    ports:
      # Localhost only by default. Open http://localhost in your browser.
      # Change to "0.0.0.0:80:3000" for LAN access.
      - "127.0.0.1:80:3000"
    environment:
      - PYTHON_BASE_URL=http://traiding-floor:8080
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────
  # OPTIONAL — Telegram alert watcher.
  # Polls the dashboard's /api/hyper_floor/status every minute and posts
  # alerts when key conditions trigger (drawdown, agent dead, circuit
  # broken). Needs TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID in your
  # user-data/.env — without those the container crashloops harmlessly.
  #
  # To enable: uncomment this block AND add the two env vars.
  # ───────────────────────────────────────────────────────────────────
  # traiding-watcher:
  #   image: ${IMAGE_NAMESPACE:-traidingfloor}/traiding-watcher:${IMAGE_TAG:-latest}
  #   container_name: traiding-watcher
  #   restart: unless-stopped
  #   depends_on:
  #     - traiding-floor
  #   env_file:
  #     - path: ./user-data/.env
  #       required: false
  #   environment:
  #     - MONITOR_TARGET_URL=http://traiding-floor:8080
  #     - WATCHER_POLL_SEC=60
  #     - HEARTBEAT_INTERVAL_H=4
  #     - DRAWDOWN_PCT_TRIP=10.0
  #     - FILL_RATE_TRIP=0.30
  #     - ALERT_COOLDOWN_SEC=900
