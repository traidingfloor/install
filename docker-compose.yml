# =============================================================================
# TrAIding Floor — one-file install
# =============================================================================
# Install (Docker required, ~30s on first run):
#
#   mkdir traidingfloor && cd traidingfloor
#   curl -fsSL https://raw.githubusercontent.com/traidingfloor/install/main/docker-compose.yml -o docker-compose.yml
#   docker compose up -d
#
# Dashboard:  http://localhost
# Direct API: http://localhost:8080
#
# Update:    docker compose pull && docker compose up -d
# Stop:      docker compose down       (containers down, data preserved)
# Wipe:      docker compose down -v    (data still on host in ./user-data/)
#
# Optional integrations (LLM reviewer, Dune intel, Telegram alerts) — see
# https://github.com/traidingfloor/install/blob/main/.env.example
# =============================================================================

services:
  # ─── Backend: FastAPI + agent loop (Hyperliquid, Head Trader, strategies) ──
  traiding-floor:
    image: traidingfloor/traiding-floor:latest
    container_name: traiding-floor
    ports:
      - "8080:8080"
    volumes:
      # All operator state (API keys, trade SQLite, beliefs, knowledge base)
      # lives here on the HOST. Container is stateless — image upgrades never
      # touch your data.
      - ./user-data:/app/user-data
      - ./logs:/app/logs
    env_file:
      - path: ./user-data/.env
        required: false
    environment:
      - TF_DOCKER=1
      - TF_USER_DATA=/app/user-data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8080/api/hyper_floor/status', timeout=3); sys.exit(0)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Next.js operator dashboard (the page humans look at) ─────────────────
  traiding-floor-web:
    image: traidingfloor/traiding-floor-web:latest
    container_name: traiding-floor-web
    depends_on:
      traiding-floor:
        condition: service_healthy
    ports:
      # If port 80 is taken on your host, change the LEFT side: "3000:3000"
      - "80:3000"
    environment:
      - PYTHON_BASE_URL=http://traiding-floor:8080
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ─── 24/7 Telegram watcher (alerts on drawdown / fill rate / agent dead) ──
  # Needs TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID in user-data/.env, otherwise
  # crashloops harmlessly without affecting trading.
  traiding-watcher:
    image: traidingfloor/traiding-watcher:latest
    container_name: traiding-watcher
    depends_on:
      - traiding-floor
    env_file:
      - path: ./user-data/.env
        required: false
    environment:
      - MONITOR_TARGET_URL=http://traiding-floor:8080
      - WATCHER_POLL_SEC=60
      - HEARTBEAT_INTERVAL_H=4
      - DRAWDOWN_PCT_TRIP=10.0
      - FILL_RATE_TRIP=0.30
      - ALERT_COOLDOWN_SEC=900
    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─── Dune Analytics intel sidecar (cross-venue arb, alts, whales) ─────────
  # Reuses the backend image; just runs a different module. Needs DUNE_API_KEY
  # in user-data/.env — exits cleanly if missing.
  traiding-dune-intel:
    image: traidingfloor/traiding-floor:latest
    container_name: traiding-dune-intel
    depends_on:
      - traiding-floor
    entrypoint: ["python", "-m", "dune_intel"]
    env_file:
      - path: ./user-data/.env
        required: false
    environment:
      - HEAD_TRADER_INTEL_URL=http://traiding-floor:8080/api/head_trader/intel
      - DUNE_POLL_INTERVAL_SEC=600
      - DUNE_ARB_QUERY_ID=7513958
      - DUNE_ALT_QUERY_ID=7513863
      - DUNE_WHALE_QUERY_ID=7513864
    healthcheck:
      test: ["CMD", "python3", "-c", "import dune_intel"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
